name: Deploy Frontend to CloudBase Hosting

# 当前主方案是 CloudBase 免费静态托管，此工作流暂时改为手动触发。
# 如后续切换到自定义域名一体化方案，可恢复 push 触发。
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Lint
        run: npm run lint

      - name: Build frontend
        # 一体化部署使用默认 BrowserRouter，API 走同域名 /api/trpc
        run: npm run build

      - name: Setup CloudBase CLI
        run: npm install -g @cloudbase/cli

      - name: Deploy to CloudBase Hosting
        env:
          TENCENT_CLOUD_SECRET_ID: ${{ secrets.TENCENT_CLOUD_SECRET_ID }}
          TENCENT_CLOUD_SECRET_KEY: ${{ secrets.TENCENT_CLOUD_SECRET_KEY }}
          TCB_ENV_ID: ${{ secrets.TCB_ENV_ID }}
        run: |
          tcb login --apiKeyId "$TENCENT_CLOUD_SECRET_ID" --apiKey "$TENCENT_CLOUD_SECRET_KEY"
          tcb hosting deploy ./dist/public ./ -e "$TCB_ENV_ID"
