name: Deploy to CloudBase (Free Plan)

# 完全免费方案：
# - 前端：CloudBase 静态网站托管默认域名
# - 后端：CloudBase HTTP 云函数默认域名
# - 数据库：CloudBase NoSQL 免费版
# - 注意：前后端使用不同默认域名，会跨域，后端已配置 CORS

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Lint
        run: npm run lint

      - name: Build function bundle
        run: npm run build:function

      - name: Make scf_bootstrap executable
        run: chmod +x cloudfunctions/api/scf_bootstrap

      - name: Setup CloudBase CLI
        run: npm install -g @cloudbase/cli

      - name: Substitute CloudBase config
        env:
          ENV_ID: ${{ secrets.TCB_ENV_ID }}
          CLOUDBASE_API_KEY: ${{ secrets.CLOUDBASE_API_KEY }}
          ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
        run: |
          node - <<'NODE'
          const fs = require('fs');
          let cfg = fs.readFileSync('cloudbaserc.json', 'utf8');
          cfg = cfg.replace(/\{\{env\.ENV_ID\}\}/g, process.env.ENV_ID);
          cfg = cfg.replace(/\{\{env\.CLOUDBASE_API_KEY\}\}/g, process.env.CLOUDBASE_API_KEY);
          cfg = cfg.replace(/\{\{env\.ALLOWED_ORIGINS\}\}/g, process.env.ALLOWED_ORIGINS);
          fs.writeFileSync('cloudbaserc.json', cfg);
          NODE

      - name: Deploy HTTP function
        env:
          TENCENT_CLOUD_SECRET_ID: ${{ secrets.TENCENT_CLOUD_SECRET_ID }}
          TENCENT_CLOUD_SECRET_KEY: ${{ secrets.TENCENT_CLOUD_SECRET_KEY }}
          TCB_ENV_ID: ${{ secrets.TCB_ENV_ID }}
        run: |
          tcb login --apiKeyId "$TENCENT_CLOUD_SECRET_ID" --apiKey "$TENCENT_CLOUD_SECRET_KEY"
          tcb fn deploy api \
            --httpFn \
            --path /api \
            --force \
            --dir ./cloudfunctions/api \
            --runtime Nodejs18.15 \
            -e "$TCB_ENV_ID"

      - name: Get function default URL
        id: function-url
        env:
          TENCENT_CLOUD_SECRET_ID: ${{ secrets.TENCENT_CLOUD_SECRET_ID }}
          TENCENT_CLOUD_SECRET_KEY: ${{ secrets.TENCENT_CLOUD_SECRET_KEY }}
          TCB_ENV_ID: ${{ secrets.TCB_ENV_ID }}
        run: |
          tcb login --apiKeyId "$TENCENT_CLOUD_SECRET_ID" --apiKey "$TENCENT_CLOUD_SECRET_KEY"

          # 尝试从 CLI 获取函数默认访问域名
          FUNCTION_INFO=$(tcb fn list -e "$TCB_ENV_ID" --json 2>/dev/null || echo '{}')
          DEFAULT_DOMAIN=$(echo "$FUNCTION_INFO" | jq -r '.functions[]? | select(.name=="api") | .defaultDomain // .domain // .url // ""' 2>/dev/null)

          # 如果 CLI 没有返回，使用默认格式兜底
          if [ -z "$DEFAULT_DOMAIN" ]; then
            DEFAULT_DOMAIN="https://${TCB_ENV_ID}.service.tcloudbase.com/api"
          fi

          # 确保 URL 以 /api/trpc 结尾
          if [[ "$DEFAULT_DOMAIN" == *"/api" ]]; then
            API_URL="${DEFAULT_DOMAIN}/trpc"
          else
            API_URL="${DEFAULT_DOMAIN%/}/api/trpc"
          fi

          echo "API_URL=$API_URL"
          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"

      - name: Build frontend with function URL
        env:
          VITE_API_URL: ${{ steps.function-url.outputs.api_url }}
          VITE_BASE_URL: "./"
          VITE_ROUTER_TYPE: "hash"
        run: npm run build

      - name: Deploy to CloudBase Hosting
        env:
          TENCENT_CLOUD_SECRET_ID: ${{ secrets.TENCENT_CLOUD_SECRET_ID }}
          TENCENT_CLOUD_SECRET_KEY: ${{ secrets.TENCENT_CLOUD_SECRET_KEY }}
          TCB_ENV_ID: ${{ secrets.TCB_ENV_ID }}
        run: |
          tcb login --apiKeyId "$TENCENT_CLOUD_SECRET_ID" --apiKey "$TENCENT_CLOUD_SECRET_KEY"
          tcb hosting deploy ./dist/public ./ -e "$TCB_ENV_ID"

      - name: Print deployment info
        run: |
          echo "前端地址：请在 CloudBase 控制台 → 静态网站托管 查看默认域名"
          echo "后端地址：${{ steps.function-url.outputs.api_url }}"
          echo "注意：前后端使用不同默认域名，浏览器会触发 CORS，后端已自动处理"
